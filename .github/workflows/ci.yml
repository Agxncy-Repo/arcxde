name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs for the same PR to save minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22.12.0'
  PNPM_VERSION: '9.15.0'
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  # -------------------------------------------------------------------------
  # Quick gates — run on every change. Should finish in under ~3 min.
  # -------------------------------------------------------------------------
  quality:
    name: Lint · Typecheck · Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # commitlint needs HEAD~1

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Commit-message lint (PR only)
        if: github.event_name == 'pull_request'
        run: |
          pnpm exec commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --verbose

  # -------------------------------------------------------------------------
  # Unit + integration tests.
  # Postgres + Redis are spun up as service containers — close to prod.
  # -------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://app:app@localhost:5432/app_test?schema=public
      REDIS_URL: redis://localhost:6379
      API_PUBLIC_URL: http://localhost:3001
      JWT_ACCESS_SECRET: ci-access-secret-not-used-in-prod-min-32-chars
      JWT_REFRESH_SECRET: ci-refresh-secret-not-used-in-prod-min-32-chars
      LOG_LEVEL: warn
      LOG_PRETTY: false

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma — generate + migrate
        run: |
          pnpm --filter @app/api db:generate
          pnpm --filter @app/api exec prisma migrate deploy

      - name: Test
        run: pnpm test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: '**/coverage/**'
          if-no-files-found: ignore
          retention-days: 7

  # -------------------------------------------------------------------------
  # Production build sanity-check. Catches "works in dev, breaks in prod" issues
  # like accidental dev-only imports.
  # -------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @app/api db:generate

      - name: Build
        run: pnpm build

  # -------------------------------------------------------------------------
  # Security checks. Non-blocking by default; promote to required once the
  # baseline is clean.
  # -------------------------------------------------------------------------
  audit:
    name: Audit dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: pnpm audit (prod, high+)
        run: pnpm audit --prod --audit-level high
