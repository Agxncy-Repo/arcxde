# =============================================================================
# Local development infrastructure.
# This file is for local-only — production runs on managed services.
# Bring it up with: docker compose up -d
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: project_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
      # tune for dev: faster, less durable
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=C'
    command:
      - 'postgres'
      - '-c'
      - 'log_statement=none'
      - '-c'
      - 'log_min_duration_statement=200'
      - '-c'
      - 'shared_buffers=256MB'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d app']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: project_redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory-policy', 'noeviction']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- Optional dev helpers (commented out by default) ----
  # adminer:
  #   image: adminer:latest
  #   container_name: project_adminer
  #   restart: unless-stopped
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     - postgres
  #
  # redisinsight:
  #   image: redis/redisinsight:latest
  #   container_name: project_redisinsight
  #   restart: unless-stopped
  #   ports:
  #     - "8001:5540"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
